name: Auto Release on New Post

on:
  push:
    branches:
      - main  # ← 기본 브랜치가 main이 아닐 경우 수정
    paths:
      - "_posts/**"  # ← 글이 올라가는 폴더 경로

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Get latest post info
        id: post
        run: |
          # 변경된 파일 중 _posts 경로에 있는 가장 마지막 파일을 찾음
          file=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^_posts/' | sort | tail -n 1)
          filename=$(basename "$file" .md)

          # 파일명에서 날짜(year, month, day)와 slug 추출
          IFS="-" read -r year month day slug <<< "${filename}"
          
          # 블로그 URL 생성
          url="https://kibeom-kim.github.io/${year}/${month}/${day}/${slug}/"

          # GitHub Actions 출력값 설정
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "title=$slug" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "post-${{ steps.post.outputs.title }}"
          name: "📝 새 글: ${{ steps.post.outputs.title }}"
          body: |
            새로운 글이 업로드되었습니다!

            👉 [글 보러 가기](${{ steps.post.outputs.url }})
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
